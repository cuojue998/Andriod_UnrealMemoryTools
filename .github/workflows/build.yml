name: Build UnrealMemoryTools
on:
  push:
    branches: ["*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source & submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build

      - name: Setup Android NDK r25c
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r25c

      - name: Cmake configure override NDK path
        run: |
          cmake -S . -B build -G Ninja \
          -DNDK_PATH=${{ steps.ndk.outputs.ndk-path }} \
          -DCMAKE_BUILD_TYPE=Release

      - name: Compile
        run: cmake --build build -j$(nproc)

      - name: Zip binary
        run: zip -r UnrealMemoryTools_arm64.zip outputs/arm64-v8a/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Compiled_Binary
          path: UnrealMemoryTools_arm64.zip
