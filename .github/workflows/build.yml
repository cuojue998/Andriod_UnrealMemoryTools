name: Build UnrealMemoryTools
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK r25c
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: List files check mk
        run: find . -name "*.mk"

      - name: Compile executable
        run: |
          ndk-build \
          NDK_PROJECT_PATH=. \
          NDK_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/core/executable.mk \
          APP_BUILD_SCRIPT=Android.mk \
          APP_ABI=arm64-v8a \
          APP_PLATFORM=android-26 \
          NDK_DEBUG=0

      - name: Upload compiled binaries
        uses: actions/upload-artifact@v4
        with:
          name: compiled-bin
          path: libs/arm64-v8a/
